<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a52a8"/>
      <stop offset="20%" stop-color="#2e6ec0"/>
      <stop offset="48%" stop-color="#5898dc"/>
      <stop offset="72%" stop-color="#90c0f0"/>
      <stop offset="87%" stop-color="#b8d8f8"/>
      <stop offset="100%" stop-color="#cce8fc"/>
    </linearGradient>
    <linearGradient id="grass" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#5ab82a"/>
      <stop offset="30%" stop-color="#3d9018"/>
      <stop offset="65%" stop-color="#2a7010"/>
      <stop offset="100%" stop-color="#1a5008"/>
    </linearGradient>
  </defs>

  <!-- Sky -->
  <rect width="1600" height="900" fill="url(#sky)"/>

  <!-- Left cloud cluster -->
  <g opacity="0.82">
    <ellipse cx="370" cy="195" rx="140" ry="30" fill="white"/>
    <ellipse cx="325" cy="183" rx="85" ry="24" fill="white"/>
    <ellipse cx="425" cy="190" rx="95" ry="23" fill="white"/>
    <ellipse cx="375" cy="172" rx="58" ry="20" fill="white"/>
    <ellipse cx="285" cy="202" rx="42" ry="13" fill="white" opacity="0.6"/>
    <ellipse cx="490" cy="205" rx="48" ry="13" fill="white" opacity="0.55"/>
  </g>

  <!-- Right cloud cluster -->
  <g opacity="0.7">
    <ellipse cx="1230" cy="160" rx="120" ry="26" fill="white"/>
    <ellipse cx="1185" cy="150" rx="70" ry="19" fill="white"/>
    <ellipse cx="1280" cy="164" rx="80" ry="19" fill="white"/>
    <ellipse cx="1228" cy="142" rx="48" ry="16" fill="white"/>
    <ellipse cx="1140" cy="170" rx="38" ry="10" fill="white" opacity="0.5"/>
  </g>

  <!-- Distant wisps -->
  <ellipse cx="760" cy="248" rx="60" ry="10" fill="white" opacity="0.22"/>
  <ellipse cx="990" cy="228" rx="75" ry="11" fill="white" opacity="0.18"/>
  <ellipse cx="130" cy="290" rx="50" ry="9" fill="white" opacity="0.2"/>
  <ellipse cx="1480" cy="270" rx="55" ry="9" fill="white" opacity="0.2"/>

  <!-- Horizon atmospheric haze -->
  <rect x="0" y="455" width="1600" height="22" fill="#cce8f8" opacity="0.12"/>

  <!-- Main hill — peak around x=560 -->
  <path d="
    M -20 900
    L -20 640
    C  80 575,  260 490,  440 438
    C  510 416,  555 404,  600 398
    C  640 393,  685 392,  740 397
    C  820 406,  920 426, 1040 460
    C 1150 490, 1290 535, 1450 598
    C 1520 628, 1580 662, 1620 700
    L 1620 900
    Z
  " fill="url(#grass)"/>

  <!-- Hill highlight — lit upper slope -->
  <path d="
    M 310 518
    C 410 464,  510 422,  600 406
    C 655 397,  710 396,  770 403
    C 850 413,  950 434, 1050 463
    C  950 440,  850 420,  770 411
    C  710 404,  655 404,  600 413
    C  510 429,  410 471,  310 524
    Z
  " fill="#80d040" opacity="0.32"/>
</svg>
